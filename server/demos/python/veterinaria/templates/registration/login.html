<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Veterinaria</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 1000px;
            max-width: 90%;
            height: 600px;
            display: flex;
        }

        .login-form {
            width: 50%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-image {
            width: 50%;
            background-color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        .login-image::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            top: -50%;
            left: -50%;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            background-color: var(--light);
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(11, 184, 200, 0.25);
            background-color: #fff;
        }

        .btn-login {
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            color: white;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: var(--primary-dark);
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background-color: var(--light);
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 30px;
        }
    </style>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="login-container">
        <div class="login-form">
            <div class="brand-icon">
                <i class="fa-solid fa-paw"></i>
            </div>
            <h3 class="fw-bold mb-2">Bienvenido de nuevo</h3>
            <p class="text-muted mb-4 pb-2">Ingresa a tu cuenta para continuar al sistema</p>

            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                <div class="alert alert-danger p-2 mb-4" style="font-size: 14px; border-radius: 8px;">
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-semibold small text-dark">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fa-regular fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="admin"
                            required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-dark d-flex justify-content-between">
                        Contraseña
                        <a href="#" class="text-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login mb-4">Iniciar Sesión</button>

            </form>
        </div>

        <div class="login-image">
            <!-- Decoration graphic -->
            <div style="z-index: 2; text-align: center; padding: 40px;">
                <i class="fa-solid fa-stethoscope" style="font-size: 80px; margin-bottom: 20px;"></i>
                <h2 class="fw-bold mb-3">Sistema de Veterinaria</h2>
                <p style="font-size: 16px; opacity: 0.8; max-width: 300px; margin: 0 auto;">Gestión completa de citas,
                    historias clínicas, inventario y facturación.</p>
            </div>
        </div>
    </div>

</body>

</html>
