{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="panel-card">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12"><label class="form-label fw-semibold">Nombre <span
                                class="text-danger">*</span></label>{{ form.nombre }}</div>
                    <div class="col-md-6"><label class="form-label fw-semibold">RUC</label>{{ form.ruc }}</div>
                    <div class="col-md-6"><label class="form-label fw-semibold">Teléfono</label>{{ form.telefono }}
                    </div>
                    <div class="col-12"><label class="form-label fw-semibold">Email</label>{{ form.email }}</div>
                    <div class="col-12"><label class="form-label fw-semibold">Dirección</label>{{ form.direccion }}
                    </div>
                    <div class="col-12"><label class="form-label fw-semibold">Contacto</label>{{ form.contacto }}</div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning rounded-pill px-4" style="color:#fff;border:none;"><i
                            class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                    <a href="{% url 'proveedor_lista' %}"
                        class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
