{% extends 'base.html' %}
{% block title %}Confirmar eliminación{% endblock %}
{% block page_title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="panel-card text-center">
            <div class="rounded-circle d-flex align-items-center justify-content-center text-white mx-auto mb-4"
                style="width:70px;height:70px;background:linear-gradient(135deg,#f43f5e,#be123c);font-size:28px;">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h5 class="fw-bold mb-2">¿Eliminar este {{ tipo }}?</h5>
            <p class="text-muted mb-4">Esta acción no se puede deshacer.<br>
                <strong>{{ objeto }}</strong>
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn btn-danger rounded-pill px-4">
                        <i class="fa-solid fa-trash me-2"></i>Sí, eliminar
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
